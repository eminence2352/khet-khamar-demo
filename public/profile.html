<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - Khet-Khamar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;700;800&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-lang="en">
  <!-- 
  ================================================================================
  PROFILE PAGE (profile.html)
  ================================================================================
  FEATURES IN THIS PAGE:
  
  1) USER PROFILE DISPLAY
     HTML Elements:
       • #profileHeader - Top section with user avatar, name, role
       • #profileUserName - User's full name
       • #profileUserRole - User's role badge (e.g., "Farmer", "Supplier", "Expert")
       • #profileLocation - User's district location
       • #profileBio - User's bio/description
     
     Data Source:
       • Backend: GET /api/profile/:userId - Fetch user profile info
     
     User Flow:
       1. User opens profile.html?userId=X
       2. Page fetches user profile from GET /api/profile/:userId
       3. Avatar, name, role, location displayed in header
  
  2) FOLLOW / UNFOLLOW (for other users)
     HTML Elements:
       • #followBtn - Button to follow/unfollow user
     
     User Flow:
       1. If viewing another user's profile, #followBtn visible
       2. User clicks #followBtn
       3. POST /api/profile/:userId/follow toggles follow state
       4. Button text changes: "Follow" ↔ "Unfollow"
     
     Backend:
       • POST /api/profile/:userId/follow - Toggle follow relationship
  
  3) USER'S POSTS SECTION
     HTML Elements:
       • #profilePostsTab - Tab to view user's posts
       • #profilePostsList - Container for user's posts
       • Posts rendered with like/comment/delete buttons
     
     User Flow:
       1. User clicks #profilePostsTab
       2. Fetch GET /api/profile/:userId/posts
       3. Posts displayed in #profilePostsList
       4. Each post has like/comment buttons
       5. Delete button only visible if viewing own profile
     
     Backend:
       • GET /api/profile/:userId/posts - Fetch user's posts
  
  4) LIKED POSTS SECTION (Own Profile Only)
     HTML Elements:
       • #profileLikedPostsTab - Tab to view liked posts
       • #profileLikedPostsList - Container for liked posts
     
     User Flow:
       1. If viewing own profile, #profileLikedPostsTab visible
       2. User clicks tab
       3. Fetch liked posts
       4. Liked posts displayed
     
     Backend:
       • GET /api/profile/me/liked-posts or similar
  
  5) COMMENTED POSTS SECTION (Own Profile Only)
     HTML Elements:
       • #profileCommentedPostsTab - Tab to view commented posts
       • #profileCommentedPostsList - Container for commented posts
     
     User Flow:
       1. If viewing own profile, #profileCommentedPostsTab visible
       2. User clicks tab
       3. Fetch commented posts
       4. Commented posts displayed
  
  6) ROLE REQUEST SECTION (Own Profile Only)
     HTML Elements:
       • #roleRequestBtn - Button to request role change
       • #roleRequestForm or link to settings-role.html
     
     User Flow:
       1. If viewing own profile, #roleRequestBtn visible
       2. User clicks #roleRequestBtn
       3. Navigates to settings-role.html or opens modal
       4. User selects desired role (Farmer → Supplier, etc.)
       5. Request submitted to admin
     
     Backend:
       • POST /api/settings/role-request - Submit role request
  
  RELATED JAVASCRIPT:
    • Handler: initProfilePage() in public/script.js (SECTION 5, Line 2440)
    • Post rendering: renderPosts() function (shared)
  
  RELATED BACKEND ROUTES:
    • GET /api/profile/:userId - Fetch user profile
    • GET /api/profile/:userId/posts - Fetch user's posts
    • POST /api/profile/:userId/follow - Toggle follow
    • GET /api/profile/me/liked-posts - Fetch own liked posts
    • POST /api/settings/role-request - Request role change
  ===============================================================================
  -->
  <header class="top-header">
    <div class="logo-block">
      <p class="logo-kicker">Farmer Community</p>
      <h1 class="logo-title">Khet-Khamar</h1>
    </div>
    <nav class="top-nav" aria-label="Primary navigation">
      <a class="nav-item" href="index.html" aria-label="Home">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
      </a>
      <a class="nav-item" href="marketplace.html" aria-label="Marketplace">
        <i class="fa-solid fa-store"></i>
        <span>Market</span>
      </a>
      <a class="nav-item nav-post" href="index.html?compose=1" aria-label="Create post">
        <i class="fa-solid fa-plus"></i>
      </a>
      <a class="nav-item" href="news.html" aria-label="News">
        <i class="fa-solid fa-newspaper"></i>
        <span>News</span>
      </a>
      <a class="nav-item active" href="profile.html" aria-label="Profile">
        <i class="fa-solid fa-user"></i>
        <span>Profile</span>
      </a>
    </nav>
  </header>

  <main id="profilePage" class="main-content profile-main">
    <section id="profileCard" class="profile-card" aria-label="Profile summary"></section>

    <section id="profileActions" class="profile-actions" aria-label="Profile actions"></section>

    <!-- Logout for profile owner (moved here from homepage) -->
    <div id="profileLogoutWrap" style="display:none; margin-top:0.5rem;">
      <button id="profileLogoutBtn" class="action-btn secondary">Logout</button>
    </div>

    <section class="profile-panel" aria-label="Profile posts">
      <div class="section-header compact">
        <h2>Posts</h2>
      </div>
      <div id="profilePosts" class="feed-list"></div>
    </section>

    <section id="connectionRequestsPanel" class="profile-panel" style="display: none;" aria-label="Connection requests">
      <div class="section-header compact">
        <h2>Connection Requests</h2>
      </div>
      <div class="request-columns">
        <div>
          <h3 class="request-heading">Incoming</h3>
          <div id="incomingRequests" class="request-list"></div>
        </div>
        <div>
          <h3 class="request-heading">Outgoing</h3>
          <div id="outgoingRequests" class="request-list"></div>
        </div>
      </div>
    </section>

    <section id="connectionsPanel" class="profile-panel" style="display: none;" aria-label="Connections list">
      <div class="section-header compact">
        <h2>Connections</h2>
      </div>
      <div id="connectionsList" class="request-list"></div>
    </section>

    <section id="sellerReviewsPanel" class="profile-panel" style="display: none;" aria-label="Seller reviews">
      <div class="section-header compact">
        <h2>Seller Reviews</h2>
      </div>
      <div id="sellerReviewsList" class="request-list"></div>
      <div id="sellerReviewForm" class="review-form-wrap" style="display:none;">
        <label for="sellerReviewRating">Your rating</label>
        <select id="sellerReviewRating" class="review-rating">
          <option value="5">5 — Excellent</option>
          <option value="4">4 — Good</option>
          <option value="3">3 — Okay</option>
          <option value="2">2 — Poor</option>
          <option value="1">1 — Terrible</option>
        </select>
        <label for="sellerReviewText">Your review</label>
        <textarea id="sellerReviewText" rows="3" placeholder="Write about your experience"></textarea>
        <button id="submitSellerReview" class="submit-review-btn">Submit Review</button>
      </div>
    </section>

    <section id="adminToolsPanel" class="profile-panel" style="display: none;" aria-label="Admin tools">
      <div class="section-header compact">
        <h2>Admin Role Tools</h2>
      </div>
      <p class="activity-meta">Grant this user a role directly.</p>
      <div class="profile-actions">
        <button id="grantExpertBtn" class="action-btn" type="button">Grant Expert</button>
        <button id="grantSellerBtn" class="action-btn secondary" type="button">Grant Seller</button>
        <button id="removeRoleBtn" class="action-btn secondary" type="button">Remove Role</button>
      </div>
    </section>

    <section id="likedPostsPanel" class="profile-panel" style="display: none;" aria-label="Liked posts">
      <div class="section-header compact">
        <h2>Posts You Liked</h2>
      </div>
      <div id="likedPostsList" class="request-list"></div>
    </section>

    <section id="commentedPostsPanel" class="profile-panel" style="display: none;" aria-label="Commented posts">
      <div class="section-header compact">
        <h2>Posts You Commented On</h2>
      </div>
      <div id="commentedPostsList" class="request-list"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
