<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings - Khet-Khamar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-lang="en">
  <header class="top-header">
    <div class="logo-block">
      <p class="logo-kicker">Farmer Community</p>
      <h1 class="logo-title">Khet-Khamar</h1>
    </div>
  </header>

  <main id="settingsHomePage" class="main-content profile-main">
    <section class="profile-panel" aria-label="Settings menu">
      <div class="section-header compact">
        <h2>Settings</h2>
      </div>
      <div class="settings-links-grid">
        <a class="settings-link-card" href="settings-password.html" aria-label="Reset password">
          <i class="fa-solid fa-key"></i>
          <div>
            <h3>Reset Password</h3>
            <p>Update your account password securely.</p>
          </div>
        </a>

        <a class="settings-link-card" href="settings-role.html" aria-label="Apply for role">
          <i class="fa-solid fa-user-gear"></i>
          <div>
            <h3>Apply For Role</h3>
            <p>Request Expert or Seller role for your account.</p>
          </div>
        </a>
      </div>
      <div class="profile-actions top-gap">
        <a class="action-btn secondary" href="profile.html">Back to Profile</a>
      </div>
    </section>
  </main>

  <nav class="bottom-nav" aria-label="Bottom navigation">
    <a class="nav-item" href="index.html" aria-label="Home">
      <i class="fa-solid fa-house"></i>
      <span>Home</span>
    </a>
    <a class="nav-item" href="marketplace.html" aria-label="Marketplace">
      <i class="fa-solid fa-store"></i>
      <span>Market</span>
    </a>
    <a class="nav-item nav-post" href="index.html?compose=1" aria-label="Create post">
      <i class="fa-solid fa-plus"></i>
    </a>
    <a class="nav-item" href="news.html" aria-label="News">
      <i class="fa-solid fa-newspaper"></i>
      <span>News</span>
    </a>
    <a class="nav-item active" href="profile.html" aria-label="Profile">
      <i class="fa-solid fa-user"></i>
      <span>Profile</span>
    </a>
  </nav>

  <script src="script.js"></script>
</body>
</html>
