<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login - Khet-Khamar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      background: linear-gradient(135deg, #274c77 0%, #3a7ca5 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      font-family: "Manrope", sans-serif;
    }

    .auth-container {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 40px;
      width: 100%;
      max-width: 420px;
      margin: 20px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .auth-header h1 {
      margin: 0 0 8px;
    }

    .auth-form {
      display: grid;
      gap: 14px;
    }

    .form-group {
      display: grid;
      gap: 6px;
    }

    .form-group input {
      padding: 12px 14px;
      border: 2px solid #ecf0f1;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
    }

    .auth-button {
      padding: 12px 16px;
      background: #274c77;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      margin-top: 8px;
    }

    .error-message {
      background-color: #fadbd8;
      color: #c0392b;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .auth-link {
      margin-top: 14px;
      text-align: center;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="auth-container">
    <div class="auth-header">
      <h1>Admin Login</h1>
      <p>Khet-Khamar moderation portal</p>
    </div>

    <div id="errorMessage" class="error-message"></div>

    <form class="auth-form" id="adminLoginForm">
      <div class="form-group">
        <label for="mobileNumber">Admin Mobile Number</label>
        <input id="mobileNumber" type="tel" placeholder="01700000004" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" placeholder="Enter admin password" required />
      </div>
      <button type="submit" class="auth-button">Login as Admin</button>
    </form>

    <p class="auth-link"><a href="login.html">Back to normal login</a></p>
  </div>

  <script>
    const form = document.getElementById("adminLoginForm");
    const errorMessage = document.getElementById("errorMessage");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      errorMessage.classList.remove("show");

      const mobileNumber = document.getElementById("mobileNumber").value.trim();
      const password = document.getElementById("password").value;

      try {
        const response = await fetch("/api/admin/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mobile_number: mobileNumber, password }),
        });

        const data = await response.json();
        if (!response.ok) {
          errorMessage.textContent = data.message || "Admin login failed.";
          errorMessage.classList.add("show");
          return;
        }

        window.location.href = "admin.html";
      } catch (error) {
        console.error(error);
        errorMessage.textContent = "Admin login failed.";
        errorMessage.classList.add("show");
      }
    });
  </script>
</body>
</html>
