<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply For Role - Khet-Khamar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;700;800&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-lang="en">
  <!-- 
  ================================================================================
  REQUEST ROLE PAGE (settings-role.html)
  ================================================================================
  FEATURE: REQUEST ROLE CHANGE (Farmer → Supplier → Expert)
  
  HTML Elements:
    • #desiredRole or #roleSelect (select dropdown) - User selects desired role
      Options: "general vendor" (Seller), "verified expert" (Expert), etc.
    • #roleRequestReason (textarea) - User explains why they want this role
    • #roleRequestForm (form) - Form containing all fields
    • #roleRequestStatus (div) - Shows current role request status
    • Submit button on form
  
  User Flow:
    1. User opens settings-role.html
    2. Page fetches current role request status from /api/settings/role-request
    3. If user has pending request, #roleRequestStatus shows: "Latest request: Supplier (pending)"
    4. User selects desired role from #desiredRole dropdown
    5. User enters reason in #roleRequestReason (e.g., "I have 10 years of farming experience")
    6. User clicks submit
    7. POST /api/settings/role-request sent with desiredRole and reason
    8. Request goes to admin for approval
    9. #roleRequestStatus updated with new request
  
  Role Types:
    • "farmer" → Can only post and comment
    • "general vendor" (Seller) → Can also sell products in marketplace
    • "verified expert" (Expert) → Can provide expert advice, higher visibility
  
  Related JavaScript Handler:
    • initRoleRequestPage() in public/script.js (SECTION 6, Line 2944)
    • Event listener on #roleRequestForm submit (Line 2984)
  
  Related Backend Routes:
    • POST /api/settings/role-request
      Request: { desiredRole, reason }
      Response: { success: true/false, message: "..." }
    • GET /api/settings/role-request
      Response: { latestRequest: { desiredRole, status, createdAt } or null }
  ===============================================================================
  -->
  <header class="top-header">
    <div class="logo-block">
      <p class="logo-kicker">Farmer Community</p>
      <h1 class="logo-title">Khet-Khamar</h1>
    </div>
    <nav class="top-nav" aria-label="Primary navigation">
      <a class="nav-item" href="index.html" aria-label="Home">
        <i class="fa-solid fa-house"></i>
        <span>Home</span>
      </a>
      <a class="nav-item" href="marketplace.html" aria-label="Marketplace">
        <i class="fa-solid fa-store"></i>
        <span>Market</span>
      </a>
      <a class="nav-item nav-post" href="index.html?compose=1" aria-label="Create post">
        <i class="fa-solid fa-plus"></i>
      </a>
      <a class="nav-item" href="news.html" aria-label="News">
        <i class="fa-solid fa-newspaper"></i>
        <span>News</span>
      </a>
      <a class="nav-item active" href="profile.html" aria-label="Profile">
        <i class="fa-solid fa-user"></i>
        <span>Profile</span>
      </a>
    </nav>
  </header>

  <main id="roleRequestPage" class="main-content profile-main">
    <section class="profile-panel" aria-label="Role request">
      <div class="section-header compact">
        <h2>Apply For Role</h2>
      </div>
      <form id="roleRequestForm" class="settings-form">
        <label for="desiredRole">Choose Role</label>
        <select id="desiredRole" required>
          <option value="">Select role</option>
          <option value="expert">Expert</option>
          <option value="seller">Seller</option>
        </select>
        <button class="action-btn" type="submit">Submit Request</button>
      </form>
      <p id="roleRequestStatus" class="activity-meta top-gap">No role request submitted yet.</p>
      <div class="profile-actions top-gap">
        <a class="action-btn secondary" href="settings.html">Back to Settings</a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
