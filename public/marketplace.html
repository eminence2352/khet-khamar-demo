<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khet-Khamar Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;700;800&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body data-lang="en">
  <!-- 
  ================================================================================
  MARKETPLACE PAGE (marketplace.html)
  ================================================================================
  FEATURES IN THIS PAGE:
  
  1) PRODUCT LISTING & BROWSING
     HTML Elements:
       • #marketplaceList - Grid container for all product cards
       • .marketplace-card - Individual product card (dynamically generated)
       • .marketplace-title, .marketplace-price, .marketplace-seller - Product info
       • .marketplace-image - Product image (from Cloudinary)
     
     User Flow:
       1. User opens marketplace.html
       2. Page loads all products from GET /api/marketplace
       3. Products displayed in grid layout
       4. User can view product details, price, seller info
     
     Backend:
       • GET /api/marketplace - Fetch all product listings
  
  2) CREATE NEW LISTING
     HTML Elements:
       • #marketplaceForm - Product creation form
       • #marketplaceProductName - Input for product name
       • #marketplacePrice - Input for product price
       • #marketplaceDescription - Input for product description
       • #marketplacePhoto - File input for product image
       • .marketplace-create-btn - Submit button
     
     User Flow:
       1. User fills #marketplaceProductName, #marketplacePrice, #marketplaceDescription
       2. User optionally selects image via #marketplacePhoto
       3. User clicks .marketplace-create-btn
       4. Image uploaded to Cloudinary (if selected)
       5. POST /api/marketplace creates product with image URL
       6. Product appears in #marketplaceList
     
     Backend:
       • POST /api/marketplace - Create new product listing
       • Image uploaded via Cloudinary API (env vars: CLOUDINARY_CLOUD_NAME, etc.)
  
  3) EDIT LISTING (Owner Only)
     HTML Elements:
       • .marketplace-edit-btn - Edit button (only visible for product owner)
       • #editMarketplaceModal - Modal for editing product
       • Related inputs for product name, price, description
     
     User Flow:
       1. User clicks .marketplace-edit-btn on their own product
       2. Edit modal appears with current product data
       3. User modifies fields
       4. User clicks save
       5. PATCH /api/marketplace/:productId updates product
     
     Backend:
       • PATCH /api/marketplace/:id - Update product listing
  
  4) DELETE LISTING (Owner Only)
     HTML Elements:
       • .marketplace-delete-btn - Delete button (only visible for product owner)
       • Delete confirmation modal
     
     User Flow:
       1. User clicks .marketplace-delete-btn on their own product
       2. Confirmation dialog appears
       3. User confirms delete
       4. DELETE /api/marketplace/:productId removes product
     
     Backend:
       • DELETE /api/marketplace/:id - Delete product listing
  
  5) SEARCH & FILTER (if implemented)
     HTML Elements:
       • #marketplaceSearchInput - Search box
       • Filter buttons or dropdowns
     
     Functionality:
       • User types in search box → matches product names/descriptions
       • Products filtered in real-time
  
  RELATED JAVASCRIPT:
    • Handler: initMarketplacePage() in public/script.js (SECTION 4, Line 1845)
    • Image upload: uploadToCloudinary() function
    • Post rendering: renderPosts() function (shared)
  
  RELATED BACKEND ROUTES:
    • GET /api/marketplace - Fetch all listings
    • POST /api/marketplace - Create listing
    • PATCH /api/marketplace/:id - Edit listing
    • DELETE /api/marketplace/:id - Delete listing
  ===============================================================================
  -->
  <header class="top-header">
    <div class="logo-block">
      <p class="logo-kicker" data-i18n="appTagline">Farmer Community</p>
      <h1 class="logo-title">Khet-Khamar</h1>
    </div>
    <nav class="top-nav" aria-label="Primary navigation">
      <a class="nav-item" href="index.html" aria-label="Home">
        <i class="fa-solid fa-house"></i>
        <span data-i18n="home">Home</span>
      </a>
      <a class="nav-item active" href="marketplace.html" aria-label="Marketplace">
        <i class="fa-solid fa-store"></i>
        <span data-i18n="marketplace">Market</span>
      </a>
      <a class="nav-item nav-post" href="index.html?compose=1" aria-label="Create post">
        <i class="fa-solid fa-plus"></i>
      </a>
      <a class="nav-item" href="news.html" aria-label="News">
        <i class="fa-solid fa-newspaper"></i>
        <span data-i18n="news">News</span>
      </a>
      <a class="nav-item" href="profile.html" aria-label="Profile">
        <i class="fa-solid fa-user"></i>
        <span data-i18n="profile">Profile</span>
      </a>
    </nav>
  </header>

  <main class="main-content marketplace-main">
    <!-- Seller Ad Posting Section (Hidden for non-sellers) -->
    <section id="sellerPostingCard" class="seller-posting-card" style="display: none;" aria-label="Post marketplace ad">
      <h2 class="posting-title" data-i18n="postNewAd">Post Your Product</h2>
      <form id="marketplaceForm" class="marketplace-form">
        <div class="form-group">
          <label for="adTitle" data-i18n="productTitle">Product Title</label>
          <input 
            type="text" 
            id="adTitle" 
            placeholder="e.g., Organic Rice Seeds" 
            data-i18n-placeholder="productTitlePlaceholder"
            required 
            maxlength="150"
          />
        </div>

        <div class="form-group">
          <label for="adDescription" data-i18n="description">Description</label>
          <textarea 
            id="adDescription" 
            placeholder="Describe your product in detail..."
            data-i18n-placeholder="descriptionPlaceholder"
            rows="4" 
            maxlength="500"
          ></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="adPrice" data-i18n="price">Price</label>
            <input 
              type="number" 
              id="adPrice" 
              placeholder="0.00" 
              min="0" 
              step="0.01" 
              required
            />
          </div>
          <div class="form-group">
            <label for="adQuantity" data-i18n="quantity">Quantity</label>
            <input 
              type="number" 
              id="adQuantity" 
              placeholder="Amount" 
              min="0"
            />
          </div>
          <div class="form-group">
            <label for="adUnit" data-i18n="unit">Unit</label>
            <input 
              type="text" 
              id="adUnit" 
              placeholder="e.g., kg, pieces" 
              data-i18n-placeholder="unitPlaceholder"
              maxlength="50"
            />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="adCategory" data-i18n="category">Category</label>
            <select id="adCategory" required>
              <option value="">Select a category</option>
              <option value="Seeds">Seeds</option>
              <option value="Equipment">Equipment</option>
              <option value="Fertilizer">Fertilizer</option>
              <option value="Pesticides">Pesticides</option>
              <option value="Produce">Produce</option>
              <option value="Tools">Tools</option>
              <option value="Services">Services</option>
              <option value="Other">Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="adLocation" data-i18n="location">Location</label>
            <select id="adLocation" required>
              <option value="">Select a location</option>
              <option value="Dhaka">Dhaka</option>
              <option value="Gazipur">Gazipur</option>
              <option value="Bogura">Bogura</option>
              <option value="Chittagong">Chittagong</option>
              <option value="Sylhet">Sylhet</option>
              <option value="Rajshahi">Rajshahi</option>
              <option value="Khulna">Khulna</option>
              <option value="Barishal">Barishal</option>
              <option value="Mymensingh">Mymensingh</option>
              <option value="Rangpur">Rangpur</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="adImage" data-i18n="productImage">Product Image</label>
          <div class="image-upload-wrapper">
            <input 
              type="file" 
              id="adImage" 
              accept="image/*" 
              data-i18n-placeholder="imageUploadHint"
            />
            <div id="adImagePreview" class="image-preview" style="display: none;">
              <img id="adImagePreviewImg" alt="Product preview" />
              <button type="button" id="removeAdImage" class="remove-btn">Remove</button>
            </div>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="submit-btn" data-i18n="postAdBtn">Post Product</button>
          <button type="reset" class="cancel-btn" data-i18n="cancelBtn">Clear</button>
        </div>
      </form>
    </section>

    <section class="market-filter" aria-label="Marketplace filters">
      <div class="market-filter-item search-field">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input
          type="search"
          placeholder="Search products"
          data-i18n-placeholder="marketSearchPlaceholder"
          aria-label="Search products"
        />
      </div>

      <div class="market-filter-item">
        <label for="categorySelect" data-i18n="category">Category</label>
        <select id="categorySelect" aria-label="Category">
          <option value="">All Categories</option>
          <option value="Seeds">Seeds</option>
          <option value="Equipment">Equipment</option>
          <option value="Fertilizer">Fertilizer</option>
          <option value="Pesticides">Pesticides</option>
          <option value="Produce">Produce</option>
          <option value="Tools">Tools</option>
          <option value="Services">Services</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="market-filter-item">
        <label for="locationSelect" data-i18n="location">Location</label>
        <select id="locationSelect" aria-label="Location">
          <option value="">All Locations</option>
          <option value="Dhaka">Dhaka</option>
          <option value="Gazipur">Gazipur</option>
          <option value="Bogura">Bogura</option>
          <option value="Chittagong">Chittagong</option>
          <option value="Sylhet">Sylhet</option>
          <option value="Rajshahi">Rajshahi</option>
          <option value="Khulna">Khulna</option>
          <option value="Barishal">Barishal</option>
          <option value="Mymensingh">Mymensingh</option>
          <option value="Rangpur">Rangpur</option>
        </select>
      </div>
    </section>

    <section class="market-grid" aria-label="Marketplace ads"></section>
  </main>

  <script src="script.js"></script>
</body>
</html>
