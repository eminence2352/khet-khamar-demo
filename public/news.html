<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>News & Weather - Khet-Khamar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .news-main {
      padding: 20px;
      padding-top: 80px;
      position: relative;
      z-index: 1;
    }

    .news-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--primary-light);
      flex-wrap: wrap;
    }

    .news-tab {
      padding: 12px 20px;
      background: none;
      border: none;
      font-size: 16px;
      font-weight: 600;
      color: var(--primary-dark);
      cursor: pointer;
      position: relative;
      transition: color 0.2s;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }

    .news-tab:hover {
      color: var(--text-dark);
    }

    .news-tab.active {
      color: var(--primary-dark);
      border-bottom-color: var(--primary-dark);
    }



    .weather-location-label {
      font-size: 0.9rem;
      font-weight: 800;
      color: var(--text-dark);
      letter-spacing: 0.01em;
    }

    .weather-location-selector {
      position: relative;
      display: inline-block;
      z-index: 10;
    }
    /* FEATURE: WEATHER LOCATION SELECTOR - Handled by setupWeatherLocationModal() in script.js */

    .weather-location-btn-select {
  background: rgba(255, 255, 255, 0.2);
  color: #ffffff;
  border: 1px solid rgba(255, 255, 255, 0.35);
  padding: 12px 20px;
  border-radius: 8px;
  font-size: 0.95rem;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  gap: 8px;
  position: relative;
}

    .weather-location-btn-select:hover {
      box-shadow: 0 6px 16px rgba(47, 160, 132, 0.3);
      transform: translateY(-2px);
    }

   .weather-location-modal {
  position: absolute;
  top: 100%;
  right: 0;        /* ← change from left: 0 to right: 0 */
  left: auto;      /* ← add this */
  background: #ffffff;
  border: 1px solid #ddd;
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
  z-index: 1001;
  min-width: 180px;
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.2s ease;
  margin-top: 4px;
  border: none;
}

    .weather-location-modal.active {
      max-height: 400px;
       border: 1px solid #ddd;
    }

    .weather-location-dropdown {
      padding: 8px 0;
    }

    .weather-location-item {
      display: block;
      width: 100%;
      padding: 12px 16px;
      border: none;
      background: none;
      text-align: left;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--text-dark);
      transition: background 0.1s ease;
      font-weight: 500;
    }

    .weather-location-item:hover {
      background: rgba(47, 160, 132, 0.08);
    }

    .weather-location-item.active {
      background: rgba(47, 160, 132, 0.15);
      color: var(--primary-dark);
      font-weight: 700;
    }

    .news-content {
      display: none;
    }

    .news-content.active {
      display: block;
    }

    .weather-container {
      display: grid;
      gap: 14px;
      margin-top: 10px;
    }

    .weather-card {
      border-radius: 14px;
      padding: 20px;
      color: #f4fff2;
      box-shadow: 0 8px 24px rgba(72, 109, 82, 0.24);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .weather-card.theme-sunny {
      background: linear-gradient(125deg, #3f8f5f 0%, #84b179 52%, #c7eabb 120%);
    }

    .weather-card.theme-rainy {
      background: linear-gradient(125deg, #376177 0%, #4f8ca8 48%, #8ac5db 120%);
    }

    .weather-card.theme-cloudy {
      background: linear-gradient(125deg, #4a6470 0%, #698793 48%, #a9bfca 120%);
    }

    .weather-card.theme-storm {
      background: linear-gradient(125deg, #384868 0%, #586d94 48%, #8fa8d6 120%);
    }

    .weather-hero {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .weather-title {
      margin: 0;
      font-size: 19px;
      font-family: "Manrope", sans-serif;
      font-weight: 800;
    }

    .weather-subtitle {
      margin: 5px 0 0;
      font-size: 12px;
      opacity: 0.9;
    }

    .weather-main {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .weather-icon {
      font-size: 44px;
      line-height: 1;
    }

    .weather-temp {
      font-size: 38px;
      font-weight: 800;
      font-family: "Manrope", sans-serif;
      line-height: 1;
      margin: 0;
    }

    .weather-desc {
      font-size: 13px;
      margin-top: 4px;
      opacity: 0.95;
    }

    .weather-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      border: 1px solid rgba(255, 255, 255, 0.35);
      border-radius: 999px;
      padding: 5px 10px;
      background: rgba(255, 255, 255, 0.12);
      margin-top: 8px;
    }

    .weather-metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 12px;
    }

    .forecast-day {
      background: linear-gradient(165deg, #edf9d8 0%, #d5efb9 100%);
      border: 1px solid #b4d59a;
      border-radius: 11px;
      padding: 12px 12px 11px;
      color: var(--text-dark);
      box-shadow: 0 6px 12px rgba(132, 177, 121, 0.12);
    }

    .forecast-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .forecast-icon {
      font-size: 20px;
      color: #658e57;
    }

    .forecast-date {
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 0;
      color: #84b179;
    }

    .forecast-condition {
      font-size: 13px;
      margin-bottom: 8px;
      min-height: 18px;
    }

    .forecast-temps {
      font-size: 13px;
      font-weight: 800;
      font-family: "Manrope", sans-serif;
      margin-bottom: 6px;
    }

    .forecast-meta {
      font-size: 12px;
      color: #587f4c;
      line-height: 1.4;
    }

    .weather-detail {
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 10px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.11);
      min-height: 54px;
    }

    .weather-detail-label {
      opacity: 0.85;
      font-size: 11px;
      margin-bottom: 4px;
    }

    .weather-detail-value {
      font-size: 14px;
      font-weight: 700;
      font-family: "Manrope", sans-serif;
    }

    .weather-outlook {
      margin-top: 12px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.14);
    }

    .weather-outlook h4 {
      margin: 0;
      font-size: 12px;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .weather-outlook p {
      margin: 6px 0 0;
      font-size: 13px;
      line-height: 1.45;
    }

    .news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .news-card {
      background: #e8f5bd;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(132, 177, 121, 0.2);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      border: 1px solid #c7eabb;
    }

    .news-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 16px rgba(132, 177, 121, 0.28);
    }

    .news-card-header {
      background: linear-gradient(135deg, #84b179 0%, #a2cb8b 100%);
      padding: 16px;
      color: #e8f5bd;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 60px;
    }

    .news-category-badge {
      background: rgba(255, 255, 255, 0.3);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .news-card-title {
      font-size: 16px;
      line-height: 1.4;
      margin: 0;
      flex: 1;
    }

    .news-card-body {
      padding: 16px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .news-card-excerpt {
      font-size: 14px;
      color: var(--text-dark);
      line-height: 1.5;
      margin-bottom: 12px;
      flex: 1;
    }

    .news-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid #c7eabb;
      font-size: 12px;
      color: #84b179;
    }

    .news-source {
      font-weight: 500;
    }

    .news-date {
      font-size: 11px;
    }

    .news-featured {
      position: relative;
    }

    .news-featured::before {
      content: '★';
      position: absolute;
      top: -4px;
      right: 8px;
      color: #84b179;
      font-size: 24px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #84b179;
    }

    .empty-state i {
      font-size: 48px;
      color: #a2cb8b;
      margin-bottom: 12px;
    }

    .loading-spinner {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 300px;
      font-size: 14px;
      color: #84b179;
    }

    .spinner {
      border: 3px solid #c7eabb;
      border-top: 3px solid #84b179;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-right: 12px;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 768px) {
      .news-tabs {
        margin-bottom: 16px;
      }

      .news-tab {
        padding: 10px 16px;
        font-size: 14px;
      }

      .weather-card {
        padding: 16px;
      }

      .weather-main {
        width: 100%;
      }

      .weather-metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .news-grid {
        grid-template-columns: 1fr;
      }

      .weather-container {
        gap: 10px;
      }
    }
  </style>
</head>

<body data-lang="en">
  <!-- 
  ================================================================================
  NEWS & WEATHER PAGE (news.html)
  ================================================================================
  FEATURES IN THIS PAGE:
  
  1) WEATHER LOCATION SELECTOR
     HTML Elements:
       • #weatherLocationTrigger - Green button showing "📍 {location} ▼"
       • #weatherLocationModal - Dropdown container (position: absolute below button)
       • .weather-location-item - Individual location buttons (6 total)
       • #currentWeatherArea - Text showing current selected location
     
     Related CSS:
       • .weather-location-selector (line 129) - Container wrapper
       • .weather-location-modal.active (line 104) - Dropdown open state
       • .weather-location-item.active (line 122) - Highlighted selected location
     
     JavaScript Handlers (embedded inline in news.html):
       • setupWeatherLocationModal() - Initialize event listeners
       • openWeatherLocationModal() / closeWeatherLocationModal() - Toggle dropdown
       • renderWeatherLocationDropdown() - Populate dropdown with location options
     
     User Flow:
       1. User opens news.html
       2. Sees green button showing "📍 Dhaka ▼" (or current location)
       3. User clicks button → dropdown opens showing 6 location options
       4. User clicks location (e.g., "Gazipur") → weather card updates → dropdown closes
       5. #currentWeatherArea text changes to "Gazipur"
       6. Weather data fetched from /api/weather?area=Gazipur&days=14
     
     Backend:
       • GET /api/weather?area={location}&days=14 - Fetch weather forecast
       • Fallback: If API fails, generates synthetic weather data
  
  2) WEATHER FORECAST DISPLAY
     HTML Elements:
       • #weatherContainer - Container for weather card(s)
       • .weather-card - Individual weather card (dynamically generated)
       • .weather-title - Location name (e.g., "Dhaka Weather Outlook")
       • .weather-temp - Current temperature
       • .forecast-grid - Grid of 14-day forecast cards
     
     Data Source:
       • Backend: GET /api/weather endpoint
       • Returns: { area, current: {...}, forecast: [{...}, ...] }
     
     Displayed Info:
       • Current: Temperature, Condition, Humidity, Wind Speed, Rainfall
       • Forecast (14 days): Max/Min temp, Condition, Rainfall, Wind Speed
  
  3) AGRICULTURAL NEWS
     HTML Elements:
       • #newsContainer - Container for news articles
       • .news-card - Individual news article (dynamically generated)
       • .news-title, .news-desc, .news-source - Article content
     
     Data Source:
       • Backend: GET /api/news endpoint
       • Returns: Array of news articles
  
  SUMMARY OF FEATURES:
    ✓ Weather Location Selector (green button with dropdown)
    ✓ 14-day Weather Forecast Display
    ✓ Agricultural News Feed
  
  RELATED BACKEND ROUTES:
    • GET /api/weather?area={location}&days=14
    • GET /api/news
    • POST /api/news/share
  ===============================================================================
  -->

    <nav class="top-nav" aria-label="Primary navigation">

        <i class="fa-solid fa-house"></i>
        <span data-i18n="home">Home</span>
      </a>
      <a class="nav-item" href="marketplace.html" aria-label="Marketplace">

        <span data-i18n="marketplace">Market</span>
      </a>

  </header>

  <main class="main-content news-main">
    <div class="news-tabs">
      <button class="news-tab active" data-tab="weather">
        <i class="fa-solid fa-cloud-sun-rain"></i> Weather
      </button>
      <button class="news-tab" data-tab="news">
        <i class="fa-solid fa-newspaper"></i> Agricultural News
      </button>
    </div>

    <!-- Weather Tab -->
    <div id="weather" class="news-content active">

      <div class="weather-container" id="weatherContainer">
        <div class="loading-spinner">
          <div class="spinner"></div>
          Loading weather data...
        </div>
      </div>
    </div>

    <!-- News Tab -->
    <div id="news" class="news-content">
      <div class="news-grid" id="newsContainer">
        <div class="loading-spinner">
          <div class="spinner"></div>
          Loading news...
        </div>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
    // ============================================
    // TAB STATE AND DATA LOADING
    // ============================================
    const tabs = document.querySelectorAll('.news-tab');
    const contents = document.querySelectorAll('.news-content');
    const weatherLocations = ['Dhaka', 'Gazipur', 'Bogura', 'Rajshahi', 'Khulna', 'Chattogram'];
    let currentWeatherArea = 'Dhaka';

    // Keep tab state and lazy-load the requested section.
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        const tabName = tab.dataset.tab;

        // Remove active class from all
        tabs.forEach(t => t.classList.remove('active'));
        contents.forEach(c => c.classList.remove('active'));

        // Add active class to clicked tab and its content
        tab.classList.add('active');
        document.getElementById(tabName).classList.add('active');

        // Load data if not already loaded
        if (tabName === 'weather') {
          loadWeather();
        } else if (tabName === 'news') {
          loadNews();
        }
      });
    });

    const activeTab = document.querySelector('.news-tab.active');
    if (activeTab && activeTab.dataset.tab === 'weather') {
      loadWeather();
    } else if (activeTab && activeTab.dataset.tab === 'news') {
      loadNews();
    }

   function setActiveWeatherLocation(area) {
  const currentArea = String(area || '').trim();
  const el = document.getElementById('currentWeatherArea');
  if (el) el.textContent = currentArea;
  document.querySelectorAll('.weather-location-item').forEach((item) => {
    item.classList.toggle('active', item.dataset.area === currentArea);
  });
}

    function renderWeatherLocationDropdown() {
      const dropdown = document.getElementById('weatherLocationDropdown');
      if (!dropdown) return;

      dropdown.innerHTML = weatherLocations
        .map(
          (area) => `
          <button 
            type="button" 
            class="weather-location-item${area === currentWeatherArea ? ' active' : ''}" 
            data-area="${area}"
          >
            ${area}
          </button>
        `
        )
        .join('');

      dropdown.querySelectorAll('.weather-location-item').forEach((item) => {
        item.addEventListener('click', () => {
          const area = item.dataset.area || 'Dhaka';
          currentWeatherArea = area;
          setActiveWeatherLocation(area);
          closeWeatherLocationModal();
          loadWeather();
        });
      });
    }

    function openWeatherLocationModal() {
      document.getElementById('weatherLocationModal').classList.add('active');
    }

    function closeWeatherLocationModal() {
      document.getElementById('weatherLocationModal').classList.remove('active');
    }

    function setupWeatherLocationModal() {
      const trigger = document.getElementById('weatherLocationTrigger');
      const modal = document.getElementById('weatherLocationModal');

      if (trigger) {
        trigger.addEventListener('click', (e) => {
          e.stopPropagation();
          modal.classList.contains('active') ? closeWeatherLocationModal() : openWeatherLocationModal();
        });
      }

      if (modal) {
        modal.addEventListener('click', (e) => {
          e.stopPropagation();
        });
      }

      document.addEventListener('click', (e) => {
        if (modal && !modal.contains(e.target) && trigger && !trigger.contains(e.target)) {
          closeWeatherLocationModal();
        }
      });
    }

    // Render weather widget using live API data.
    async function loadWeather(area = currentWeatherArea) {
      const container = document.getElementById('weatherContainer');
      const selectedArea = String(area || 'Dhaka').trim() || 'Dhaka';
      currentWeatherArea = selectedArea;

      setActiveWeatherLocation(selectedArea);

      function buildFallbackWeather(areaName) {
        const today = new Date();
        const forecast = Array.from({ length: 14 }, (_, index) => {
          const day = new Date(today);
          day.setDate(today.getDate() + index);
          return {
            date: day.toISOString().slice(0, 10),
            maxTemp: 30,
            minTemp: 23,
            condition: index % 3 === 0 ? 'Partly Cloudy' : 'Clear',
            rainfall: index % 2 === 0 ? 2 : 0,
            windSpeed: 10,
          };
        });

        return {
          area: areaName,
          days: 14,
          current: {
            temperature: 27,
            condition: 'Partly Cloudy',
            humidity: 78,
            windSpeed: 10,
            rainfall: 2,
          },
          forecast,
        };
      }

      try {
        const response = await fetch(`/api/weather?area=${encodeURIComponent(selectedArea)}&days=14`);
        if (!response.ok) throw new Error('Failed to fetch weather');

        let weatherData = await response.json();

        if (!weatherData || !weatherData.current || !Array.isArray(weatherData.forecast) || weatherData.forecast.length === 0) {
          weatherData = buildFallbackWeather(selectedArea);
        }

        if (!weatherData.current || !Array.isArray(weatherData.forecast) || weatherData.forecast.length === 0) {
          weatherData = buildFallbackWeather(selectedArea);
        }

        const current = weatherData.current;
        const themeClass = getWeatherThemeClass(current.condition);
        const outlookText = getWeatherOutlook(current, weatherData.forecast || []);
        const forecastCards = weatherData.forecast
          .map(day => {
            const dayDate = new Date(day.date);
            const dayName = dayDate.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
            return `
              <article class="forecast-day">
                <div class="forecast-head">
                  <div class="forecast-date">${dayName}</div>
                  <i class="fa-solid forecast-icon ${getWeatherIcon(day.condition)}"></i>
                </div>
                <div class="forecast-condition">${day.condition}</div>
                <div class="forecast-temps">${day.maxTemp}° / ${day.minTemp}°</div>
                <div class="forecast-meta">Rain: ${day.rainfall} mm<br />Wind: ${day.windSpeed} km/h</div>
              </article>
            `;
          })
          .join('');

        container.innerHTML = `
            <div class="weather-card ${themeClass}">
              <div class="weather-hero">
                <div>
                  <h3 class="weather-title">${weatherData.area} Weather Outlook</h3>
                  <p class="weather-subtitle">${weatherData.days} day forecast for farm planning</p>
                </div>
                <div class="weather-main">
                  <div class="weather-icon">
                    <i class="fa-solid ${getWeatherIcon(current.condition)}"></i>
                  </div>
                  <div>
                    <div class="weather-temp">${current.temperature}°C</div>
                    <div class="weather-desc">${current.condition}</div>
                    <div class="weather-location-selector" style="position:relative; margin-top:8px; display:inline-block;">
  <button class="weather-location-btn-select" id="weatherLocationTrigger" style="font-size:13px; padding:6px 14px;">
    <i class="fa-solid fa-location-dot"></i>
    <span id="currentWeatherArea">${weatherData.area}</span>
    <i class="fa-solid fa-chevron-down"></i>
  </button>
  <div class="weather-location-modal" id="weatherLocationModal">
    <div class="weather-location-dropdown" id="weatherLocationDropdown"></div>
  </div>
</div>
                  </div>
                </div>
              </div>
              <div class="weather-metrics">
                <div class="weather-detail">
                  <div class="weather-detail-label">Humidity</div>
                  <div class="weather-detail-value">${current.humidity}%</div>
                </div>
                <div class="weather-detail">
                  <div class="weather-detail-label">Wind</div>
                  <div class="weather-detail-value">${current.windSpeed} km/h</div>
                </div>
                <div class="weather-detail">
                  <div class="weather-detail-label">Rain</div>
                  <div class="weather-detail-value">${current.rainfall} mm</div>
                </div>
                <div class="weather-detail">
                  <div class="weather-detail-label">Forecast Span</div>
                  <div class="weather-detail-value">${weatherData.days} Days</div>
                </div>
              </div>
              <div class="weather-outlook">
                <h4>Farming Outlook</h4>
                <p>${outlookText}</p>
              </div>
            </div>
            <section class="forecast-grid">${forecastCards}</section>
        `;
        renderWeatherLocationDropdown();
    setupWeatherLocationModal();
      } catch (error) {
        console.error('Weather error:', error);
        container.innerHTML = '<div class="empty-state"><i class="fa-solid fa-cloud-exclamation"></i><p>Failed to load weather</p></div>';
      }
    }

    

    // Render agricultural news cards.
    async function loadNews() {
      const container = document.getElementById('newsContainer');

      try {
        const response = await fetch('/api/news');
        if (!response.ok) throw new Error('Failed to fetch news');

        const newsData = await response.json();

        if (Array.isArray(newsData) && newsData.length === 0) {
          container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1"><i class="fa-solid fa-newspaper"></i><p>No news available</p></div>';
          return;
        }

        window.__newsCache = newsData;

        container.innerHTML = newsData
          .map(news => {
            const date = new Date(news.createdAt).toLocaleDateString('en-US', {
              year: 'numeric',
              month: 'short',
              day: 'numeric',
            });
            const featuredClass = news.isFeatured ? 'news-featured' : '';
            const sourceContent = news.url
              ? `<a class="news-inline-link" href="${news.url}" target="_blank" rel="noopener noreferrer">${news.source}</a>`
              : `<span class="news-source">${news.source}</span>`;
            const titleContent = news.url
              ? `<a class="news-inline-link" href="${news.url}" target="_blank" rel="noopener noreferrer">${news.title}</a>`
              : `${news.title}`;
            const readLink = news.url
              ? `<a class="news-inline-link news-inline-read" href="${news.url}" target="_blank" rel="noopener noreferrer">Read Original</a>`
              : '';
            return `
              <article class="news-card ${featuredClass}">
                <div class="news-card-header">
                  <div>
                    <h3 class="news-card-title">${titleContent}</h3>
                  </div>
                  <span class="news-category-badge">${news.category}</span>
                </div>
                <div class="news-card-body">
                  <p class="news-card-excerpt">${news.excerpt || news.content}</p>
                  <div class="news-card-footer">
                    ${sourceContent}
                    <span class="news-date">${date}</span>
                  </div>
                  ${readLink}
                  <button
                    class="news-share-btn"
                    type="button"
                    data-news-title="${encodeURIComponent(news.title || '')}"
                    data-news-excerpt="${encodeURIComponent(news.excerpt || news.content || '')}"
                    data-news-url="${encodeURIComponent(news.url || '')}"
                    data-news-source="${encodeURIComponent(news.source || '')}"
                    data-news-category="${encodeURIComponent(news.category || '')}"
                  >
                    Share to Feed
                  </button>
                </div>
              </article>
            `;
          })
          .join('');
      } catch (error) {
        console.error('News error:', error);
        container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1"><i class="fa-solid fa-triangle-exclamation"></i><p>Failed to load news</p></div>';
      }
    }

    // ============================================
    // WEATHER DISPLAY HELPERS
    // ============================================
    function normalizeWeatherCondition(condition) {
      return String(condition || '').toLowerCase();
    }

    // Match weather text to an icon class.
    function getWeatherIcon(condition) {
      const lowerCondition = normalizeWeatherCondition(condition);
      if (lowerCondition.includes('rain')) return 'fa-cloud-rain';
      if (lowerCondition.includes('cloud')) return 'fa-cloud';
      if (lowerCondition.includes('sun') || lowerCondition.includes('clear')) return 'fa-sun';
      if (lowerCondition.includes('wind')) return 'fa-wind';
      if (lowerCondition.includes('thunder')) return 'fa-cloud-bolt';
      return 'fa-cloud-sun';
    }

    function getWeatherThemeClass(condition) {
      const lowerCondition = normalizeWeatherCondition(condition);
      if (lowerCondition.includes('thunder') || lowerCondition.includes('storm')) return 'theme-storm';
      if (lowerCondition.includes('rain') || lowerCondition.includes('drizzle')) return 'theme-rainy';
      if (lowerCondition.includes('cloud') || lowerCondition.includes('fog')) return 'theme-cloudy';
      return 'theme-sunny';
    }

    // Turn raw weather readings into farmer-friendly advice text.
    function getWeatherOutlook(current, forecast) {
      const rainToday = Number(current.rainfall) || 0;
      const windToday = Number(current.windSpeed) || 0;
      const humidity = Number(current.humidity) || 0;
      const maxRain = Math.max(...(forecast || []).map(day => Number(day.rainfall) || 0), 0);

      if (rainToday >= 10 || maxRain >= 15) {
        return 'Heavy rain risk detected. Prioritize drainage checks, delay spraying, and protect seedbeds from waterlogging.';
      }

      if (windToday >= 28) {
        return 'Strong wind conditions expected. Secure lightweight structures and avoid pesticide spraying during peak wind hours.';
      }

      if (humidity >= 85) {
        return 'Humidity is high, which may increase fungal pressure. Monitor leaves for early disease signs and improve field airflow.';
      }

      return 'Conditions look stable for routine field work. Good window for irrigation planning, light fertilization, and transplant care.';
    }

    // ============================================
    // EVENT WIRING
    // ============================================
    // Load initial data
    const weatherAreaSelect = document.getElementById('weatherAreaSelect');
    const newsContainer = document.getElementById('newsContainer');

    if (newsContainer) {
      newsContainer.addEventListener('click', async (event) => {
        const button = event.target.closest('.news-share-btn');
        if (!button) {
          return;
        }

        try {
          const authResponse = await fetch('/api/auth/check');
          const authData = await authResponse.json();
          if (!authData.authenticated) {
            alert('Please login to share news to your feed.');
            window.location.href = '/login.html';
            return;
          }

          const payload = {
            title: decodeURIComponent(button.dataset.newsTitle || ''),
            excerpt: decodeURIComponent(button.dataset.newsExcerpt || ''),
            url: decodeURIComponent(button.dataset.newsUrl || ''),
            source: decodeURIComponent(button.dataset.newsSource || ''),
            category: decodeURIComponent(button.dataset.newsCategory || ''),
          };

          const shareResponse = await fetch('/api/news/share', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          const shareData = await shareResponse.json();

          if (!shareResponse.ok) {
            alert(shareData.message || 'Failed to share news.');
            return;
          }

          alert('News shared to your feed.');
        } catch (error) {
          console.error('Failed to share news:', error);
          alert('Failed to share news.');
        }
      });
    }

    if (weatherAreaSelect) {
      weatherAreaSelect.addEventListener('change', loadWeather);
    }

    loadWeather();
  </script>
</body>

</html>
